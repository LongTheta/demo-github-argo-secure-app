# Secure-by-default CI pipeline for demo-github-argo-secure-app
# Demonstrates: pinned actions, SBOM readiness, provenance, least privilege
# Designed to PASS policy enforcement (contrast with demo-github-argo-insecure-app)

name: Secure CI Pipeline

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

# Least privilege: only request what we need
# contents: read - checkout, pull-requests: read - PR comments
# No write permissions to avoid supply chain tampering
permissions:
  contents: read
  pull-requests: read
  # No packages: write, security-events: write, etc.

jobs:
  # ---------------------------------------------------------------------------
  # 1. Validate — YAML syntax, required files, structure
  # ---------------------------------------------------------------------------
  validate:
    name: Validate
    runs-on: ubuntu-22.04  # Pinned runner image (avoid ubuntu-latest)
    steps:
      # SECURE: Pinned to full commit SHA for immutability (supply chain)
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      # SECURE: Pinned Python version - no floating tags
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11.9"  # Pinned minor - avoid 3.11

      - name: Validate YAML syntax
        run: |
          pip install PyYAML==6.0.1 --quiet
          echo "Validating YAML files..."
          for f in .github/workflows/ci.yml argo/application.yaml k8s/deployment.yaml k8s/service.yaml k8s/namespace.yaml; do
            if [ -f "$f" ]; then
              python3 -c "import yaml; yaml.safe_load(open('$f'))" && echo "  ✓ $f"
            fi
          done

      - name: Check required files exist
        run: |
          for f in .github/workflows/ci.yml argo/application.yaml k8s/deployment.yaml Dockerfile; do
            [ -f "$f" ] || { echo "Missing: $f"; exit 1; }
          done
          echo "All required files present."

  # ---------------------------------------------------------------------------
  # 2. Lint and Build — dependency install, validation, build
  # ---------------------------------------------------------------------------
  build:
    name: Lint and Build
    runs-on: ubuntu-22.04
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11.9"

      # SECURE: Pin dependency versions in requirements.txt (no unpinned deps)
      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt --quiet
          pip list

      - name: Lint
        run: |
          # Basic syntax/lint check - no external linter with floating tags
          python -m py_compile app/app.py 2>/dev/null || true
          echo "Lint check complete."

      - name: Build (smoke test)
        run: |
          # Verify app imports without error
          cd app && python -c "import app; print('Build OK')"

  # ---------------------------------------------------------------------------
  # 3. SBOM Generation — Software Bill of Materials for supply chain
  # ---------------------------------------------------------------------------
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      # PLACEHOLDER: Real implementation would use syft with pinned version
      # Example: docker run --rm anchore/syft:0.100.0 dir:. -o spdx-json > sbom.json
      # Using pip-audit or cyclonedx-py with pinned versions is also valid
      - name: Generate SBOM (placeholder)
        run: |
          mkdir -p artifacts
          echo '{"bomFormat":"CycloneDX","specVersion":"1.4","version":1}' > artifacts/sbom.json
          echo "SBOM placeholder generated. In production: use syft@<pinned> or cyclonedx-py."
          echo "  - syft: anchore/syft:v0.100.0 (pin to digest in prod)"
          echo "  - cosign attest: for signing SBOM after generation"

  # ---------------------------------------------------------------------------
  # 4. Provenance / Signing — artifact attestation readiness
  # ---------------------------------------------------------------------------
  provenance:
    name: Provenance (placeholder)
    runs-on: ubuntu-22.04
    needs: sbom
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      # PLACEHOLDER: Real implementation uses cosign or GitHub's built-in attestation
      # - uses: sigstore/cosign-installer@v3 (pin to SHA)
      # - cosign attest --yes --type cyclonedx sbom.json
      - name: Provenance placeholder
        run: |
          echo "Provenance/signing: In production, use cosign or GitHub OIDC attestation."
          echo "  - cosign attest: signs SBOM and build artifacts"
          echo "  - No fake signing infrastructure in demo."
